<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MiPaper - Unread Snapshots</title>
    <meta
      name="description"
      content="Unread branch snapshots waiting for review."
    />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <script>
      (function () {
        var storedMode = localStorage.getItem("cool-paper-theme") || "auto";
        var prefersDark =
          typeof window.matchMedia === "function" &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        var resolvedTheme = storedMode === "auto" ? (prefersDark ? "dark" : "light") : storedMode;
        document.documentElement.dataset.theme = resolvedTheme;
        document.documentElement.dataset.themeMode = storedMode;
      })();
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="page-library page-library-unread">
    <div class="page-shell">
      <div class="page-chrome">
        <div id="unread-toolbar-root"></div>
      </div>
      <header class="hero reveal">
        <div class="hero-copy">
          <h1>Unread Snapshots</h1>
          <p class="hero-text">
            Fetched branch snapshots that still need review. Use Lib Home for overview stats, and use this page to clear the review queue.
          </p>
          <div class="hero-actions page-like-jump-links" aria-label="Unread shortcuts">
            <a class="link-chip" href="./library.html">Open Lib Home</a>
            <a class="link-chip" href="./like.html">Open Liked</a>
          </div>
        </div>
      </header>

      <main>
        <section class="glass-card queue-section unread-section library-section reveal">
          <div class="section-heading">
            <p class="eyebrow">UNREAD SNAPSHOTS</p>
            <h2>Unread Snapshots</h2>
            <p id="unread-summary" class="home-board-summary">-</p>
          </div>
          <div id="unread-list" class="conference-spotlight"></div>
          <div id="unread-actions"></div>
        </section>
      </main>
    </div>

    <script type="module" src="./unread_snapshots.js?v=90729b0801"></script>
  </body>
</html>
