<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MiPaper - Unread Snapshots</title>
    <meta
      name="description"
      content="Unread branch snapshots waiting for review."
    />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <script>
      (function () {
        var storedMode = localStorage.getItem("cool-paper-theme") || "auto";
        var prefersDark =
          typeof window.matchMedia === "function" &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        var resolvedTheme = storedMode === "auto" ? (prefersDark ? "dark" : "light") : storedMode;
        document.documentElement.dataset.theme = resolvedTheme;
        document.documentElement.dataset.themeMode = storedMode;
      })();
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="page-library page-library-unread">
    <div class="page-shell">
      <div class="page-chrome">
        <div id="unread-toolbar-root"></div>
        <template id="unread-toolbar-filters">
          <section class="glass-card controls reveal">
            <div class="control-block">
              <label for="unread-search-input">Search</label>
              <input id="unread-search-input" class="control-input" type="search" placeholder="Search title, branch, or snapshot" />
            </div>
          </section>
        </template>
      </div>
      <header class="hero reveal">
        <div class="hero-copy">
          <h1>Unread Snapshots</h1>
          <p class="hero-text">
            Fetched branch snapshots that still need review.
          </p>
        </div>
        <div class="hero-panel glass-card">
          <div class="hero-panel-top">
            <span class="meta-kicker">Unread Snapshot Pulse</span>
            <strong id="unread-hero-count">-</strong>
          </div>
          <div class="hero-stat-grid">
            <div>
              <span class="stat-label">Branches</span>
              <strong id="unread-hero-branches">-</strong>
            </div>
            <div>
              <span class="stat-label">Latest</span>
              <strong id="unread-hero-latest">-</strong>
            </div>
            <div>
              <span class="stat-label">Top Branch</span>
              <strong id="unread-hero-branch">-</strong>
            </div>
            <div>
              <span class="stat-label">Reviewed</span>
              <strong id="unread-hero-reviewed">-</strong>
            </div>
          </div>
        </div>
      </header>

      <main>
        <section class="glass-card queue-section unread-section library-section reveal">
          <div class="section-heading">
            <p class="eyebrow">UNREAD SNAPSHOTS</p>
            <h2>Unread Snapshots</h2>
            <p id="unread-summary" class="home-board-summary">-</p>
          </div>
          <div id="unread-list" class="conference-spotlight"></div>
          <div id="unread-pagination"></div>
        </section>
      </main>
    </div>

    <script type="module" src="./unread_snapshots.js?v=20260319-13"></script>
  </body>
</html>
