<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MiPaper - Direct Add</title>
    <meta name="description" content="Direct add branch showing papers added from URLs." />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <script>
      (function () {
        var storedMode = localStorage.getItem("cool-paper-theme") || "auto";
        var prefersDark =
          typeof window.matchMedia === "function" &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        var resolvedTheme = storedMode === "auto" ? (prefersDark ? "dark" : "light") : storedMode;
        document.documentElement.dataset.theme = resolvedTheme;
        document.documentElement.dataset.themeMode = storedMode;
      })();
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="page-library page-direct-add">
    <div class="page-shell">
      <div class="page-chrome">
        <div id="direct-toolbar-root"></div>
        <template id="direct-toolbar-filters">
          <section class="glass-card controls reveal">
            <div class="control-block">
              <label for="direct-sort">Sort</label>
              <select id="direct-sort" class="control-input">
                <option value="newest">Newest first</option>
                <option value="oldest">Oldest first</option>
                <option value="title">Title A-Z</option>
              </select>
            </div>
            <div class="control-block">
              <label for="direct-metadata-filter">Metadata</label>
              <select id="direct-metadata-filter" class="control-input">
                <option value="all">All direct adds</option>
                <option value="complete">Complete metadata</option>
                <option value="incomplete">Needs metadata</option>
              </select>
            </div>
          </section>
        </template>
      </div>

      <header class="hero reveal">
        <div class="hero-copy">
          <p class="eyebrow">DIRECT ADD</p>
          <h1>Direct Add Papers</h1>
          <p class="hero-text">Papers added directly from URL.</p>
        </div>
        <div class="hero-panel glass-card">
          <div class="hero-panel-top">
            <span class="meta-kicker">Direct Add Pulse</span>
            <strong id="direct-hero-count">-</strong>
          </div>
          <div class="hero-stat-grid">
            <div>
              <span class="stat-label">Likes</span>
              <strong id="direct-hero-liked">-</strong>
            </div>
            <div>
              <span class="stat-label">Complete</span>
              <strong id="direct-hero-complete">-</strong>
            </div>
            <div>
              <span class="stat-label">Pending</span>
              <strong id="direct-hero-pending">-</strong>
            </div>
            <div>
              <span class="stat-label">Source</span>
              <strong id="direct-hero-source">Library</strong>
            </div>
          </div>
        </div>
      </header>

      <main>
        <section class="glass-card queue-section library-section reveal" aria-label="Direct add papers">
          <div class="section-heading">
            <p class="eyebrow">DIRECT ADD</p>
            <h2>Direct</h2>
            <p id="direct-summary" class="home-board-summary">-</p>
          </div>
          <div id="direct-list" class="conference-spotlight" role="list"></div>
          <div id="direct-pagination"></div>
        </section>
      </main>
    </div>

    <script type="module" src="./direct_add.js?v=81b5e1ee31"></script>
  </body>
</html>
