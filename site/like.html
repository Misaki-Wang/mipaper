<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MiPaper - Liked Papers</title>
    <meta
      name="description"
      content="Liked papers across Cool Daily, Conference, and HF Daily."
    />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <script>
      (function () {
        var storedMode = localStorage.getItem("cool-paper-theme") || "auto";
        var prefersDark =
          typeof window.matchMedia === "function" &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        var resolvedTheme = storedMode === "auto" ? (prefersDark ? "dark" : "light") : storedMode;
        document.documentElement.dataset.theme = resolvedTheme;
        document.documentElement.dataset.themeMode = storedMode;
      })();
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="page-like page-library page-library-liked">
    <div class="page-shell">
      <div class="page-chrome">
                <div id="like-toolbar-root"></div>
        <template id="like-toolbar-filters">
          <section class="glass-card controls reveal">
            <div class="control-block">
              <label for="like-source-filter">Group</label>
              <select id="like-source-filter" class="control-input">
                <option value="">All Groups</option>
              </select>
            </div>
            <div class="control-block">
              <label for="like-topic-filter">Topic</label>
              <select id="like-topic-filter" class="control-input">
                <option value="">All Topics</option>
              </select>
            </div>
            <div class="control-block">
              <label for="like-custom-tag-filter">Custom Tag</label>
              <select id="like-custom-tag-filter" class="control-input">
                <option value="">All Tags</option>
              </select>
            </div>
            <div class="control-block">
              <label for="like-status-filter">Status</label>
              <select id="like-status-filter" class="control-input">
                <option value="">All Statuses</option>
              </select>
            </div>
            <div class="control-block">
              <label for="like-priority-filter">Priority</label>
              <select id="like-priority-filter" class="control-input">
                <option value="">All Priorities</option>
              </select>
            </div>
            <div class="control-block">
              <label for="like-search-input">Search</label>
              <input id="like-search-input" class="control-input" type="search" placeholder="Search title or authors" />
            </div>
          </section>
        </template>

      </div>

      <header class="hero reveal">
        <div class="hero-copy">
          <p class="eyebrow">LIKED PAPERS</p>
          <h1>Liked Papers</h1>
          <p class="hero-text">
            Your retained paper set. Use Lib Home for aggregated stats, and use this page to browse, filter, and reopen specific likes.
          </p>
          <div class="hero-actions page-like-jump-links" aria-label="Quick jump">
            <a class="link-chip" href="./library.html">Open Lib Home</a>
            <a class="link-chip" href="#like-results-section">Jump to liked papers</a>
            <a class="link-chip" href="#like-browse-section">Browse by group</a>
            <a class="link-chip" href="#like-saved-views-section">Saved views</a>
          </div>
        </div>
      </header>

      <main class="layout">
        <section class="content">
          <section id="like-results-section" class="glass-card results-strip library-section reveal">
            <div class="results-top">
              <div>
                <p class="eyebrow">LIKED PAPERS</p>
                <h2 id="like-results-title">0 liked papers</h2>
              </div>
              <div class="results-top-actions">
                <button id="like-reset-filters" class="link-chip button-link" type="button">Reset filters</button>
              </div>
            </div>
            <div class="results-grid">
              <div id="like-results-stats" class="results-stats"></div>
              <div id="like-active-filters" class="active-filter-chips"></div>
            </div>
          </section>

          <section id="like-browse-section" class="glass-card library-section reveal">
            <div id="like-source-sections" class="conference-subject-sections"></div>
          </section>

          <section id="like-saved-views-section" class="glass-card library-section reveal saved-view-panel">
            <div class="section-heading saved-view-top">
              <div>
                <p class="eyebrow">SAVED VIEWS</p>
                <h2>Saved Views</h2>
                <p id="like-saved-view-summary" class="home-board-summary">No saved views yet.</p>
              </div>
            </div>
            <div class="saved-view-controls">
              <label class="control-block saved-view-name-field" for="like-saved-view-name">
                <span>View Name</span>
                <input id="like-saved-view-name" class="control-input" type="text" placeholder="e.g. Agent Reading" maxlength="48" />
              </label>
              <div class="saved-view-actions">
                <button id="like-save-view" class="pill-button" type="button">Save Current</button>
                <button id="like-update-view" class="pill-button" type="button">Update Selected</button>
                <button id="like-delete-view" class="pill-button" type="button">Delete Selected</button>
              </div>
            </div>
            <div id="like-saved-view-list" class="saved-view-list"></div>
          </section>
        </section>
      </main>
    </div>

    <button id="like-back-to-top" class="back-to-top" type="button" aria-hidden="true">
      <span>↑</span>
      <span>Top</span>
    </button>

    <script type="module" src="./like.js?v=20260320like9"></script>
  </body>
</html>
