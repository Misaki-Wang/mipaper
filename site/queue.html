<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MiPaper - Later Queue</title>
    <meta
      name="description"
      content="Later queue for papers you want to read soon."
    />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <script>
      (function () {
        var storedMode = localStorage.getItem("cool-paper-theme") || "auto";
        var prefersDark =
          typeof window.matchMedia === "function" &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        var resolvedTheme = storedMode === "auto" ? (prefersDark ? "dark" : "light") : storedMode;
        document.documentElement.dataset.theme = resolvedTheme;
        document.documentElement.dataset.themeMode = storedMode;
      })();
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="page-library">
    <div class="page-shell">
      <div class="page-chrome">
        <div id="queue-toolbar-root"></div>
        <template id="queue-toolbar-filters">
          <section class="glass-card controls reveal">
            <div class="control-block">
              <label for="queue-search-input">Search</label>
              <input id="queue-search-input" class="control-input" type="search" placeholder="Search title, authors, or topic" />
            </div>
          </section>
        </template>
      </div>
      <header class="hero reveal">
        <div class="hero-copy">
          <h1>Later Queue</h1>
          <p class="hero-text">
            Papers saved for later reading.
          </p>
        </div>
        <div class="hero-panel glass-card">
          <div class="hero-panel-top">
            <span class="meta-kicker">Later Queue Pulse</span>
            <strong id="later-hero-count">-</strong>
          </div>
          <div class="hero-stat-grid">
            <div>
              <span class="stat-label">Likes</span>
              <strong id="later-hero-liked">-</strong>
            </div>
            <div>
              <span class="stat-label">Branches</span>
              <strong id="later-hero-branches">-</strong>
            </div>
            <div>
              <span class="stat-label">Source</span>
              <strong id="later-hero-source">-</strong>
            </div>
            <div>
              <span class="stat-label">Topic</span>
              <strong id="later-hero-topic">-</strong>
            </div>
          </div>
        </div>
      </header>

      <main>
        <section class="glass-card queue-section library-section reveal" aria-label="Later reading list">
          <div class="section-heading">
            <p class="eyebrow">QUEUE</p>
            <h2>Later</h2>
            <p id="later-summary" class="home-board-summary">-</p>
          </div>
          <div id="later-list" class="conference-spotlight" role="list"></div>
          <div id="later-pagination"></div>
        </section>
      </main>
    </div>

    <script type="module" src="./queue.js?v=23d6120da0"></script>
  </body>
</html>
